<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>邱建棋</title>
<style>
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    min-height:100%;
    background:#f6f3ec;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",Arial,sans-serif;
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
    color:#eaeff5;
  }
  .page{
    width:100%;
    max-width:430px;
  }
  .card{
    position:relative;
    overflow:hidden;
    border-radius:22px;
    background:#33507a;
    color:#eaeff5;
    padding:28px 28px 24px;
    box-shadow:0 18px 42px rgba(27,27,31,.22);
  }
  .top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:18px;
  }
  .name{
    font-family:"Noto Serif SC","Songti SC",serif;
    font-size:34px;
    font-weight:800;
    letter-spacing:.0;
    margin:0 0 6px;
    line-height:1.12;
  }
  .title{
    font-size:16px;
    opacity:.78;
    line-height:1.35;
    margin:0;
  }
  .brand-logo{
    width:72px;
    height:72px;
    border-radius:50%;
    object-fit:cover;
    flex-shrink:0;
  }
  .brand-logo.letters{
    display:flex;
    align-items:center;
    justify-content:center;
    background:#c97a4a;
    color:#33507a;
    font-weight:800;
    font-size:20px;
  }
  .rule{
    width:64px;
    height:4px;
    border-radius:2px;
    background:#c97a4a;
    margin:18px 0 20px;
  }
  .company{
  font-size:19px;
  font-weight:700;
  letter-spacing:.08em;
  line-height:1.45;
  margin-bottom:20px;
  margin-left:-4px;
  white-space:nowrap;
}

  .info{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-bottom:24px;
  }
  .info a{
  color:#9ED8FF;
  text-decoration:none;
  display:flex;
  align-items:flex-start;
  gap:10px;
  font-size:16px;
  line-height:1.45;
  opacity:1;
  word-break:break-all;
}

  .dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#c97a4a;
    margin-top:.55em;
    flex-shrink:0;
  }

  /* 按钮在上 */
  .actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-top:8px;
  }
  .actions a{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:48px;
    border-radius:999px;
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.18);
    color:#eaeff5;
    text-decoration:none;
    font-weight:700;
    font-size:15px;
  }
  .actions a.primary{
    background:#c97a4a;
    color:#33507a;
    border-color:#c97a4a;
  }

  /* 二维码在下，居中 */
  .qr-box{
    width:180px;
    margin:26px auto 0;
    text-align:center;
    color:#eaeff5;
    opacity:.92;
    font-size:13px;
    line-height:1.3;
  }
  .qr-box img{
    width:180px;
    height:180px;
    object-fit:contain;
    background:#fff;
    padding:8px;
    border-radius:18px;
    display:block;
    margin:0 auto 10px;
  }

  .footer{
    text-align:center;
    margin-top:14px;
    color:#6B6B70;
    font-size:12px;
  }

  @media (max-width:390px){
    body{padding:14px;}
    .card{padding:24px 22px 22px;}
    .name{
      font-size:30px;
      letter-spacing:.03em;
      margin-bottom:5px;
    }
    .title{font-size:15px;}
    .brand-logo{
      width:64px;
      height:64px;
    }
    .company{
      font-size:18px;
      letter-spacing:.10em;
    }
    .info a{
      font-size:15px;
    }
    .actions a{
      min-height:44px;
      font-size:14px;
    }
    .qr-box{
      width:164px;
    }
    .qr-box img{
      width:164px;
      height:164px;
    }
  }

  @media (max-width:360px){
    .name{font-size:28px;}
    .company{font-size:17px;}
    .info a{font-size:14px;}
    .actions{
      gap:10px;
    }
    .actions a{
      min-height:42px;
      font-size:13px;
    }
    .qr-box{
      width:150px;
    }
    .qr-box img{
      width:150px;
      height:150px;
    }
  }
</style>
</head>
